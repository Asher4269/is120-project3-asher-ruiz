<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>budget-buddy</title>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
    ></script>
    <script defer src="script.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header><h1>budget-buddy</h1></header>
    <nav>
      <p class="p-nav">Nav:</p>
      <a href="#create-budget">Create Budget</a>
      <a href="#display-budget">Budget Display</a>
    </nav>
    <main>
      <!-- Input Area: This is where CRUD takes place. -->
      <div id="create-budget" class="input-area">
        <h2>Input Line Item</h2>
        <div class="group-of-inputs">
          <div class="single-input">
            <label for="user_name">Username:</label>
            <input
              type="text"
              id="user_name"
              name="user_name"
              placeholder="enter username"
              required
            />
          </div>
          <div class="single-input">
            <label for="budget_name">Budget Name:</label>
            <input
              type="text"
              id="budget_name"
              name="budget_name"
              placeholder="enter budget name"
              required
            />
          </div>
          <div class="single-input">
            <label for="type">Type:</label>
            <select name="type" id="type">
              <option value="">--Select an option--</option>
              <!-- Placeholder -->
              <option value="Expenses">Expenses</option>
              <option value="Budgets">Budgets</option>
              <option value="Savings">Savings</option>
            </select>
          </div>
          <div class="single-input">
            <label for="name">Name of Item:</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="ex.Auto Insurance"
            />
          </div>
          <div class="single-input">
            <label for="amount">Amount:</label>
            <input
              type="text"
              id="amount"
              name="amount"
              placeholder="ex. 400.00"
            />
          </div>
        </div>
        <div class="crud-buttons">
          <button class="alter-item">Alter Item</button>
          <button class="delete-item">Delete Item</button>
          <button class="add-item">Add Item</button>
        </div>
      </div>

      <!-- Display Area: This will display a table and ultimate calculation area that shows budget criteria to user based on budget name. -->
      <div id="display-budget" class="budget-display-area">
        <h2>Displaying Budget: [<span class="budget-name"></span>]</h2>
        <!-- ! Come back and change these divs to tables. With Headings? -->
        <h3>Expenses</h3>
        <div class="expenses-category"></div>
        <h3>Budgets</h3>
        <div class="budgets-category"></div>
        <h3>Savings</h3>
        <div class="savings-category"></div>
        <h3>Income Calculator</h3>
        <div class="income-calculator"></div>
      </div>
    </main>
  </body>
</html>
